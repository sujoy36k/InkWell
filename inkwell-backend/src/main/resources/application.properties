# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (H2 in-memory for dev; swap datasource for prod PostgreSQL) ───────
spring.datasource.url=jdbc:h2:mem:inkwelldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Anthropic AI ──────────────────────────────────────────────────────────────
# Set via environment variable: ANTHROPIC_API_KEY=sk-ant-...
# Or replace placeholder here (not recommended for production)
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=claude-sonnet-4-20250514

# ── CORS (comma-separated origins) ───────────────────────────────────────────
inkwell.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.inkwell=INFO
logging.level.org.springframework.web=WARN
